<!DOCTYPE html>
<html>
<head>
    <title>Attendance Records</title>
    <style>
        body { font-family: Arial; margin:30px; background:#f5f5f5; }
        h2, h3 { text-align:center; color:#333; }
        table { width:70%; margin:auto; border-collapse:collapse; background:#fff; box-shadow:0 0 10px #aaa; }
        th, td { padding:12px; text-align:center; border-bottom:1px solid #ddd; }
        th { background:#4CAF50; color:white; }
        tr:hover {background:#f1f1f1;}
        button { padding:10px 20px; font-size:16px; border:none; cursor:pointer; background:#f44336; color:white; }
        .center { text-align:center; margin-bottom:20px; }
    </style>
</head>
<body>
    <h2>Attendance Dashboard</h2>
    <h3>Session Status: {{ session_status }}</h3>

    <div class="center">
        <a href="{{ url_for('end_attendance') }}">
            <button>End Attendance</button>
        </a>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
        </tr>
        {% for row in records %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
